apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  progressDeadlineSeconds: 60
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  replicas: 1
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: {{ .Values.api.registry }}:{{ .Values.api.version }}
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - name: http-web
              containerPort: 80
          env:
            - name: QUIZLORD_VERSION
              value: {{ .Values.api.version | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.api.dopplerSecretName }}
      imagePullSecrets:
        - name: {{ .Values.docker.registrySecretName }}
